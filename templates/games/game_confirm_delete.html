{% extends "base.html" %}
{% block title %}Deletar — GameTracker{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-16 text-center">
  <div class="card p-8">
    <div class="text-5xl mb-4">🗑️</div>
    <h1 class="font-display text-xl font-bold mb-2" style="color:var(--text)">Confirmar remoção</h1>
    <p class="text-sm mb-1" style="color:var(--text-soft)">Remover permanentemente:</p>
    <p class="font-semibold text-lg mb-6" style="color:var(--text)">"{{ game.title }}"?</p>
    <div class="flex gap-3 justify-center">
      <form method="post">{% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-500 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition">Confirmar</button>
      </form>
      <a href="{% url 'game_detail' game.pk %}" class="px-6 py-2.5 rounded-xl font-semibold text-sm transition" style="background:var(--surface2);color:var(--text-soft)">Cancelar</a>
    </div>
  </div>
</div>
{% endblock %}
